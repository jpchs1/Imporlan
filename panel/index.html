    <script>
      (function() {
        var originalAlert = window.alert;
        window.alert = function(message) {
          var msgLower = (message || '').toLowerCase();
          if (msgLower.indexOf('error al procesar') !== -1 ||
              msgLower.indexOf('error al conectar') !== -1) {
            return originalAlert.call(window, message);
          }
          if (msgLower.indexOf('configurar la api') !== -1 ||
              msgLower.indexOf('requiere configuracion') !== -1 ||
              msgLower.indexOf('esta es una demo') !== -1) {
            console.log('Payment override: Blocked demo alert');
            return;
          }
          return originalAlert.call(window, message);
        };
      })();
    </script>

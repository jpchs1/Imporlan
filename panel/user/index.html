<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/imporlan-favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imporlan - Mi Panel</title>
    <style>
      #app-loader {
        position: fixed; inset: 0; z-index: 9999;
        background: linear-gradient(135deg, #0f172a 0%, #0e2a3d 50%, #0f172a 100%);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        transition: opacity 0.4s ease;
      }
      #app-loader.fade-out { opacity: 0; pointer-events: none; }
      #app-loader img { width: 120px; height: auto; margin-bottom: 24px; animation: loaderPulse 2s ease-in-out infinite; }
      #app-loader .loader-bar { width: 160px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
      #app-loader .loader-bar-fill { width: 40%; height: 100%; background: linear-gradient(90deg, #06b6d4, #0891b2); border-radius: 4px; animation: loaderSlide 1.2s ease-in-out infinite; }
      @keyframes loaderPulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.97); } }
      @keyframes loaderSlide { 0% { transform: translateX(-100%); } 100% { transform: translateX(400%); } }
    </style>
    <script type="module" crossorigin src="/panel/user/assets/index-CIIZfk4F.js"></script>
    <link rel="stylesheet" crossorigin href="/panel/user/assets/index-4-QBmBpe.css">
  </head>
  <body>
    <div id="app-loader">
      <img src="/images/logo-imporlan-blanco.png" alt="Imporlan" onerror="this.style.display='none'" />
      <div class="loader-bar"><div class="loader-bar-fill"></div></div>
    </div>
    <div id="root"></div>
    <script>
      // Hide loader when React mounts
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          const loader = document.getElementById('app-loader');
          if (loader) { loader.classList.add('fade-out'); setTimeout(() => loader.remove(), 500); }
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
      // Fallback: hide after 5s
      setTimeout(() => { const l = document.getElementById('app-loader'); if (l) { l.classList.add('fade-out'); setTimeout(() => l.remove(), 500); } }, 5000);
    </script>
  </body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <rect width="200" height="220" rx="16" fill="#F5A623"/>
  <g transform="translate(100,80)" fill="none" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Skier body -->
    <circle cx="8" cy="-38" r="8" fill="#1a1a1a"/>
    <!-- Torso -->
    <line x1="8" y1="-30" x2="2" y2="-8"/>
    <!-- Left arm with pole -->
    <line x1="6" y1="-24" x2="-18" y2="-14"/>
    <line x1="-18" y1="-14" x2="-22" y2="16"/>
    <!-- Right arm with pole -->
    <line x1="6" y1="-24" x2="24" y2="-10"/>
    <line x1="24" y1="-10" x2="28" y2="16"/>
    <!-- Left leg -->
    <line x1="2" y1="-8" x2="-12" y2="10"/>
    <!-- Right leg -->
    <line x1="2" y1="-8" x2="14" y2="10"/>
    <!-- Skis -->
    <line x1="-24" y1="12" x2="0" y2="12" stroke-width="4"/>
    <line x1="2" y1="12" x2="26" y2="12" stroke-width="4"/>
    <!-- Pole tips -->
    <circle cx="-22" cy="16" r="2.5" fill="#1a1a1a"/>
    <circle cx="28" cy="16" r="2.5" fill="#1a1a1a"/>
  </g>
  <!-- Text -->
  <text x="100" y="150" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="22" fill="#1a1a1a">CLASES DE SKI</text>
  <text x="100" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-style="italic" font-size="11" fill="#1a1a1a">Aprende mientras disfrutas!</text>
</svg>
